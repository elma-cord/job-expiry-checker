name: Job expiry check (Playwright) - parallel

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"   # daily at 02:00 UTC

jobs:
  split:
    runs-on: ubuntu-latest
    outputs:
      chunks: ${{ steps.set.outputs.chunks }}
    steps:
      - uses: actions/checkout@v4

      - name: Split job_url.txt into chunks
        id: set
        run: |
          python - <<'PY'
          import math, os, json

          src = "job_url.txt"
          with open(src, "r", encoding="utf-8") as f:
            urls = [line.strip() for line in f if line.strip()]

          n = 6  # number of parallel chunks (adjust to 4/6/8)
          size = math.ceil(len(urls) / n)

          os.makedirs("chunks", exist_ok=True)
          chunk_files = []
          for i in range(n):
            part = urls[i*size:(i+1)*size]
            if not part:
              continue
            fn = f"chunks/job_url_part_{i+1}.txt"
            with open(fn, "w", encoding="utf-8") as out:
              out.write("\n".join(part) + "\n")
            chunk_files.append(fn)

          # output list of chunk indices (1..k)
          idx = list(range(1, len(chunk_files)+1))
          print("Chunks:", idx)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as gh:
            gh.write(f"chunks={json.dumps(idx)}\n")
          PY

      - name: Upload chunks for other jobs
        uses: actions/upload-artifact@v4
        with:
          name: url-chunks
          path: chunks/

  run_chunks:
    needs: split
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.split.outputs.chunks) }}

    steps:
      - uses: actions/checkout@v4

      - name: Download chunk files
        uses: actions/download-artifact@v4
        with:
          name: url-chunks
          path: chunks

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('requirements.txt') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run checker (this chunk)
        run: |
          python check_jobs.py chunks/job_url_part_${{ matrix.chunk }}.txt \
            -o results_part_${{ matrix.chunk }}.csv \
            -c 3 \
            -t 25 \
            -b 300 \
            --pw-threads 2 \
            --sheet-webhook ""

      - name: Upload chunk result
        uses: actions/upload-artifact@v4
        with:
          name: results-parts
          path: results_part_${{ matrix.chunk }}.csv

  merge:
    needs: run_chunks
    runs-on: ubuntu-latest
    steps:
      - name: Download all parts
        uses: actions/download-artifact@v4
        with:
          name: results-parts
          path: parts

      - name: Merge CSVs
        run: |
          python - <<'PY'
          import glob, csv

          files = sorted(glob.glob("parts/results_part_*.csv"))
          if not files:
            raise SystemExit("No part CSVs found")

          out = "results.csv"
          header_written = False
          with open(out, "w", newline="", encoding="utf-8") as w:
            writer = None
            for fn in files:
              with open(fn, "r", newline="", encoding="utf-8") as r:
                reader = csv.reader(r)
                header = next(reader, None)
                if header is None:
                  continue
                if not header_written:
                  writer = csv.writer(w)
                  writer.writerow(header)
                  header_written = True
                for row in reader:
                  writer.writerow(row)

          print("Merged:", out, "from", len(files), "files")
          PY

      - name: Upload merged results
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: results.csv
